name: Demo Workflow

on:
  workflow_dispatch:
    inputs:
      mensaje:
        description: 'Mensaje a imprimir por consola'
        required: true
        default: 'Hola desde GitHub Actions!'
        type: string

jobs:
  imprimir-mensaje:
    name: Imprimir Mensaje
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Imprimir mensaje por consola
        run: |
          echo "================================================"
          echo "  Mensaje recibido: ${{ github.event.inputs.mensaje }}"
          echo "================================================"
          echo "Ejecutado por: ${{ github.actor }}"
          echo "Rama: ${{ github.ref_name }}"
          echo "Fecha: $(date '+%Y-%m-%d %H:%M:%S')"